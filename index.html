<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <headcer>
        <h1>Calculator</h1>
    </header>
    <div id="main">
        <div id="res">0</div>
        <div class="game">
            <div id="row1" class="row">
                <div class="same">1</div>
                <div class="same">2</div>
                <div class="same">3</div>
                <div class="same">+</div>
            </div>
            <div id="row2" class="row">
                <div class="same">4</div>
                <div class="same">5</div>
                <div class="same">6</div>
                <div class="same">-</div>
            </div>
            <div id="row3" class="row">
                <div class="same">7</div>
                <div class="same">8</div>
                <div class="same">9</div>
                <div class="same">*</div>
            </div>
            <div id="row4" class="row">
                <div class="same">0</div>
                <div class="same">(</div>
                <div class="same">)</div>
                <div class="same">/</div>
                
            </div>
            <div id="row5" class="row">
                <div class="same">=</div>
                <div class="same"><i class="fa-solid fa-delete-left"></i></div>
                <div id="clear" class="same">AC</div>
            </div>
        </div>
        
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>  
    <!-- // added for calculating the result of input expression -->
    <script src="newscript.js"></script>
</body>

</html>
